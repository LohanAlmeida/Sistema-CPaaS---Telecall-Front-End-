<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="hero text-center">
  <h2>Acesso ao Sistema</h2>
  <p>Plataforma CPaaS</p>
</div>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card card-custom p-4 w-100" style="max-width:400px">

<h4 class="text-center mb-3 title">Login</h4>

<input id="login" class="form-control mb-2" placeholder="Login">
<input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-primary-custom w-100 mb-2" onclick="login()">Entrar</button>
<button class="btn btn-outline-custom w-100" onclick="window.location='cadastro.html'">Cadastrar</button>

<div id="msg" class="mt-2 text-center text-danger"></div>

</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
