<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviço</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-custom px-3">
  <span class="navbar-brand">Telecall CPaaS</span>

  <div>
    <button class="btn btn-light btn-sm me-2" onclick="toggleDark()">🌙</button>
    <button class="btn btn-light btn-sm me-2" onclick="aumentarFonte()">A+</button>
    <button class="btn btn-light btn-sm me-2" onclick="diminuirFonte()">A-</button>

    <span id="usuario" class="text-white fw-bold"></span>

    <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">⏻ Sair</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero text-center">
  <h2 id="titulo"></h2>
  <p>Detalhes do serviço selecionado</p>

</div>

<!-- CONTEÚDO -->
<div class="container mt-4">

  <div class="row g-4">

    <!-- MENU LATERAL (SUBMENU) -->
    <div class="col-md-3">
      <div class="card card-custom p-3">
        <h5 class="title mb-3">Serviços</h5>

        <div class="list-group">
          <button class="list-group-item list-group-item-action" onclick="ir('2fa')"><h5><i class="bi bi-shield-lock"></i> 2FA</h5></button>
          <button class="list-group-item list-group-item-action" onclick="ir('numero')"><h5><i class="bi bi-phone"></i> Número Máscara</h5></button>
          <button class="list-group-item list-group-item-action" onclick="ir('google')"><h5><i class="bi bi-patch-check"></i> Google Verify</h5></button>
          <button class="list-group-item list-group-item-action" onclick="ir('sms')"><h5><i class="bi bi-chat-dots"></i> SMS</h5></button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="col-md-9">

      <div class="card card-custom p-4">

        <h4 class="title mb-3">Descrição</h4>
        <p id="conteudo"></p>

        <hr>

        <h5 class="title">Benefícios</h5>
        <ul id="beneficios">
          <li>Alta disponibilidade</li>
          <li>Segurança avançada</li>
          <li>Escalabilidade</li>
        </ul>

        <hr>

        <button onclick="window.location='home.html'" class="btn btn-primary-custom">
          ← Voltar
        </button>

      </div>

    </div>

  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
