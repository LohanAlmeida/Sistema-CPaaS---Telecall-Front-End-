<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-custom px-3">
<span class="navbar-brand">Telecall CPaaS</span>

<div>
<button class="btn btn-light btn-sm me-2" onclick="toggleDark()">🌙</button>
<button class="btn btn-light btn-sm me-2" onclick="aumentarFonte()">A+</button>
<button class="btn btn-light btn-sm me-2" onclick="diminuirFonte()">A-</button>

<span id="usuario" class="text-white"></span>

<button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">⏻ Sair</button>
</div>
</nav>

<div class="hero text-center mb-4">
  <h2>Soluções Inteligentes</h2>
  <p>Escolha um serviço</p>
</div>

<div class="container mt-4">
<div class="row g-3">

<div class="col-md-3">
<div class="card card-custom p-4 text-center" onclick="ir('2fa')">
<h5>🔐 2FA</h5>
<p>Autenticação segura</p>
</div>
</div>

<div class="col-md-3">
<div class="card card-custom p-4 text-center" onclick="ir('numero')">
<h5>📱 Número Máscara</h5>
<p>Privacidade em chamadas</p>
</div>
</div>

<div class="col-md-3">
<div class="card card-custom p-4 text-center" onclick="ir('google')">
<h5>✔ Google Verify</h5>
<p>Validação inteligente</p>
</div>
</div>

<div class="col-md-3">
<div class="card card-custom p-4 text-center" onclick="ir('sms')">
<h5>💬 SMS</h5>
<p>Envio automatizado</p>
</div>
</div>

</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
