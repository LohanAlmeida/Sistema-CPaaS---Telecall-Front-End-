<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<div class="hero text-center">
  <h2>Cadastro</h2>
</div>

<div class="container mt-4">

<div class="card card-custom p-4">

<h4 class="title">Cadastro de Usuário</h4>

<form id="formCadastro">

<input id="nome" class="form-control mb-2" placeholder="Nome completo">
<input id="nomeMae" class="form-control mb-2" placeholder="Nome da mãe completo">
<input id="nascimento" type="date" class="form-control mb-2">
<input id="sexo" class="form-control mb-2" placeholder="Sexo">
<input id="cpf" class="form-control mb-2" placeholder="CPF">
<input id="celular" class="form-control mb-2" placeholder="+5521-999999999">
<input id="fixo" class="form-control mb-2" placeholder="+5521-222222222">
<input id="endereco" class="form-control mb-2" placeholder="Endereço">
<input id="login" class="form-control mb-2" placeholder="Login (6 letras)">
<input id="senha" type="password" class="form-control mb-2" placeholder="Senha (8 letras)">
<input id="confirmar" type="password" class="form-control mb-3" placeholder="Confirmar senha">

<button class="btn btn-primary-custom w-100">Cadastrar</button>


<div id="msg" class="text-danger text-center mt-2"></div>

</form>

</div>
</div>

<footer class="footer-custom">
  <div class="container">
    <div class="row">

      <!-- LOGO / SOBRE -->
      <div class="col-md-4 mb-3">
        <h5 class="footer-title">Telecall CPaaS</h5>
        <p style="font-size: 14px;">
          Soluções inteligentes em comunicação, segurança e automação para empresas modernas.
        </p>
      </div>

      <!-- LINKS -->
      <div class="col-md-4 mb-3">
        <h5 class="footer-title">Links</h5>
        <a href="home.html" class="footer-link">Início</a>
        <a href="cadastro.html" class="footer-link">Cadastro</a>
        <a href="#" class="footer-link">Suporte</a>
      </div>

      <!-- CONTATO -->
      <div class="col-md-4 mb-3">
        <h5 class="footer-title">Contato</h5>
        <p><i class="bi bi-envelope footer-icon"></i> suporte@telecall.com</p>
        <p><i class="bi bi-telephone footer-icon"></i> (21) 99999-9999</p>
      </div>

    </div>

    <hr style="border-color: rgba(255,255,255,0.1);">

    <div class="text-center" style="font-size: 14px;">
      © 2026 Telecall CPaaS — Todos os direitos reservados
    </div>
  </div>
</footer>
<script src="js/app.js"></script>
</body>
</html>
